        console.log("1. Define API URL");
        let url = "https://pokeapi.co/api/v2/pokemon";
        
        console.log("2. Initiate a Fetch");
        let fetchPromise = fetch(url)
            .then((response) => {
                console.log("4. Receive response and initiate JSON");
                return response.json();
            })
            .then((data) => {
                console.log("5. Receive JSON");
                console.log(data);
