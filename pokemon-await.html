<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Lists</title>
</head>
<body>

    <h1>Pokemon Lists</h1>

    <script>

    console.log("1. Define API URL")
    let url = "https://pokeapi.co/api/v2/pokemon";

    console.log("2. Define our async function.")
    async function getPokemon()
    {

        console.log("4. Fetch Pokemon data")
        let fetchResponse = await fetch(url);
        console.log(fetchResponse);

        console.log("6. Convert Pokemon data to JSON")
        let data = await fetchResponse.json();

        console.log("7. Output data")
        console.log(data);

    }

    console.log("3. Execute our async function")
    getPokemon();

    console.log("5. Script ends.")

    </script>
    
</body>
</html>
